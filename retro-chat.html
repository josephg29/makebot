<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>UI SAMPLE</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=Press+Start+2P&display=swap');

  /* DEEP SEA — dark teal bg, yellow accent, red hi */
  :root {
    --bg:       #050505;
    --panel:    #041e27;
    --border:   #177E89;
    --accent:   #177E89;
    --hi:       #DB3A34;
    --dim:      #177E89;
    --txt:      #177E89;
    --user-bg:  #177E89;
    --user-txt: #050505;
    --bot-bg:   #050505;
    --bot-txt:  #177E89;
    --btn-color:  #177E89;
    --btn-border: #DB3A34;
    --pixel: 2px;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: var(--bg);
    color: var(--txt);
    font-family: 'Share Tech Mono', monospace;
    font-size: 13px;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    overflow: hidden;
    image-rendering: pixelated;
  }

  .shell {
    width: 520px;
    max-width: 98vw;
    display: flex;
    flex-direction: column;
  }

  /* ── HEADER ── */
  .header {
    border: var(--pixel) solid var(--border);
    border-bottom: none;
    background: var(--panel);
    padding: 10px 14px 8px;
    display: flex;
    align-items: center;
    justify-content: space-between;
  }

  .header-left { display: flex; flex-direction: column; gap: 3px; }

  .logo {
    font-family: 'Press Start 2P', monospace;
    font-size: 9px;
    color: var(--accent);
    letter-spacing: 3px;
    line-height: 1;
  }

  .tagline {
    font-size: 10px;
    color: var(--dim);
    letter-spacing: 2px;
    text-transform: uppercase;
  }

  .status-cluster { display: flex; flex-direction: column; align-items: flex-end; gap: 4px; }

  .status-dot {
    width: 8px; height: 8px;
    background: var(--hi);
    display: inline-block;
    animation: blink 1.4s step-end infinite;
  }

  @keyframes blink { 0%,100%{opacity:1} 50%{opacity:0} }

  .status-text { font-size: 9px; color: var(--hi); letter-spacing: 1px; }

  .pixel-divider {
    height: var(--pixel);
    background: var(--border);
    position: relative;
    overflow: hidden;
  }
  .pixel-divider::after {
    content: '';
    position: absolute; inset: 0;
    background: repeating-linear-gradient(
      90deg, var(--accent) 0px, var(--accent) 6px,
      transparent 6px, transparent 12px
    );
    opacity: 0.3;
  }

  /* ── MESSAGES ── */
  .messages {
    border-left: var(--pixel) solid var(--border);
    border-right: var(--pixel) solid var(--border);
    background: var(--bg);
    height: 360px;
    overflow-y: auto;
    padding: 16px 14px;
    display: flex;
    flex-direction: column;
    gap: 14px;
    scroll-behavior: smooth;
  }

  .messages::-webkit-scrollbar { width: 6px; }
  .messages::-webkit-scrollbar-track { background: var(--panel); }
  .messages::-webkit-scrollbar-thumb { background: var(--border); }

  .msg {
    display: flex; flex-direction: column; gap: 4px;
    animation: fadeUp 0.15s ease-out forwards;
    opacity: 0; transform: translateY(6px);
  }

  @keyframes fadeUp { to { opacity:1; transform:translateY(0); } }

  .msg-label {
    font-family: 'Press Start 2P', monospace;
    font-size: 7px; letter-spacing: 2px;
    color: var(--dim); text-transform: uppercase;
  }

  .msg.user .msg-label { color: var(--accent); text-align: right; }
  .msg.user { align-items: flex-end; }
  .msg.bot  { align-items: flex-start; }

  .msg-bubble {
    max-width: 82%;
    padding: 8px 12px;
    line-height: 1.65;
    font-size: 12px;
    letter-spacing: 0.5px;
    word-break: break-word;
  }

  .msg.bot .msg-bubble {
    background: var(--bot-bg);
    color: var(--bot-txt);
    border: var(--pixel) solid var(--accent);
    box-shadow: 4px 4px 0 var(--bg), 4px 4px 0 1px var(--border);
  }

  .msg.user .msg-bubble {
    background: var(--user-bg);
    color: var(--user-txt);
    border: var(--pixel) solid var(--hi);
    box-shadow: -4px 4px 0 var(--bg), -4px 4px 0 1px var(--border);
  }

  .typing-bubble {
    display: flex; gap: 5px;
    padding: 10px 14px;
    background: var(--bot-bg);
    border: var(--pixel) solid var(--border);
    width: fit-content;
    animation: fadeUp 0.15s ease-out forwards;
  }

  .typing-bubble span {
    width: 6px; height: 6px;
    background: var(--accent); display: block;
    animation: typeDot 0.8s step-end infinite;
  }
  .typing-bubble span:nth-child(2) { animation-delay: 0.2s; }
  .typing-bubble span:nth-child(3) { animation-delay: 0.4s; }

  @keyframes typeDot { 0%,100%{opacity:.2} 50%{opacity:1} }

  /* ── INPUT ── */
  .input-area {
    border-left: var(--pixel) solid var(--border);
    border-right: var(--pixel) solid var(--border);
    background: var(--panel);
    padding: 10px 12px;
    display: flex; gap: 8px; align-items: center;
  }

  .prompt-symbol {
    font-family: 'Press Start 2P', monospace;
    font-size: 9px; color: var(--accent);
    flex-shrink: 0; padding-top: 1px;
  }

  .input-field {
    flex: 1; background: transparent;
    border: none; outline: none;
    color: var(--txt);
    font-family: 'Share Tech Mono', monospace;
    font-size: 13px; letter-spacing: 0.5px;
    caret-color: var(--accent);
  }

  .input-field::placeholder { color: var(--dim); }

  .send-btn {
    font-family: 'Press Start 2P', monospace;
    font-size: 8px;
    color: var(--user-txt);
    background: var(--btn-color);
    border: var(--pixel) solid var(--btn-border);
    padding: 7px 10px; cursor: pointer;
    letter-spacing: 1px; text-transform: uppercase;
    transition: filter 0.05s, transform 0.05s;
  }

  .send-btn:hover { filter: brightness(1.2); }
  .send-btn:active { transform: translate(2px,2px); filter: none; }
  .send-btn:disabled { opacity: 0.4; cursor: default; }

  /* ── BOTTOM ROW ── */
  .bottom-row {
    border: var(--pixel) solid var(--border);
    background: var(--panel);
    padding: 7px 12px;
    display: flex;
    align-items: center;
    justify-content: space-between;
  }

  .swatch-cluster { display: flex; align-items: center; gap: 5px; }

  .swatch-label {
    font-family: 'Press Start 2P', monospace;
    font-size: 6px;
    color: var(--dim);
    letter-spacing: 1px;
    margin-right: 4px;
  }

  .swatch {
    width: 13px; height: 13px;
    cursor: pointer;
    border: 2px solid #041e27;
    image-rendering: pixelated;
    transition: transform 0.05s;
    flex-shrink: 0;
  }

  .swatch:hover { transform: scale(1.25); }
  .swatch.active { border-color: #ffffff; }
  .swatch:active { transform: translate(1px,1px) scale(1); }

  .footer-right {
    font-size: 9px;
    color: var(--dim);
    letter-spacing: 1px;
  }

  .sprite { width: 24px; height: 24px; image-rendering: pixelated; flex-shrink: 0; }

  .msg.system { align-items: center; }
  .msg.system .msg-bubble {
    font-size: 10px; color: var(--dim);
    background: transparent; border: none; box-shadow: none;
    text-align: center; padding: 2px 0;
    letter-spacing: 2px; text-transform: uppercase;
  }
</style>
</head>
<body>

<div class="shell">

  <div class="header">
    <div class="header-left">
      <div class="logo">APP NAME</div>
      <div class="tagline">tagline here</div>
    </div>

    <svg class="sprite" viewBox="0 0 8 8" xmlns="http://www.w3.org/2000/svg">
      <rect width="8" height="8" fill="#0d0d0d"/>
      <rect x="1" y="1" width="6" height="6" fill="#084C61"/>
      <rect x="2" y="2" width="1" height="1" fill="#0d0d0d"/>
      <rect x="5" y="2" width="1" height="1" fill="#0d0d0d"/>
      <rect x="2" y="5" width="1" height="1" fill="#0d0d0d"/>
      <rect x="5" y="5" width="1" height="1" fill="#0d0d0d"/>
      <rect x="3" y="5" width="2" height="1" fill="#0d0d0d"/>
      <rect x="2" y="4" width="4" height="1" fill="#DB3A34"/>
    </svg>

    <div class="status-cluster">
      <div class="status-dot"></div>
      <div class="status-text">ONLINE</div>
    </div>
  </div>

  <div class="pixel-divider"></div>

  <div class="messages" id="messages">
    <div class="msg system"><div class="msg-bubble">── placeholder ui ──</div></div>
    <div class="msg bot">
      <div class="msg-label">AGENT</div>
      <div class="msg-bubble">Bot message placeholder. This is where agent responses will appear.</div>
    </div>
    <div class="msg user">
      <div class="msg-label">USER</div>
      <div class="msg-bubble">User message placeholder.</div>
    </div>
    <div class="msg bot">
      <div class="msg-label">AGENT</div>
      <div class="msg-bubble">Second response placeholder. Type anything below to test the interaction.</div>
    </div>
  </div>

  <div class="pixel-divider"></div>

  <div class="input-area">
    <div class="prompt-symbol">&gt;_</div>
    <input class="input-field" id="inputField" type="text"
      placeholder="placeholder input..." autocomplete="off" spellcheck="false" maxlength="300"/>
    <button class="send-btn" id="sendBtn">SEND</button>
  </div>

  <div class="bottom-row">
    <div class="swatch-cluster">
      <span class="swatch-label">BTN</span>
      <div class="swatch active"  data-color="#177E89" data-border="#DB3A34" style="background:#177E89;"></div>
      <div class="swatch"         data-color="#177E89" data-border="#084C61" style="background:#177E89;"></div>
      <div class="swatch"         data-color="#084C61" data-border="#177E89" style="background:#084C61;"></div>
      <div class="swatch"         data-color="#e8e8e8" data-border="#177E89" style="background:#e8e8e8;"></div>
      <div class="swatch"         data-color="#DB3A34" data-border="#177E89" style="background:#DB3A34;"></div>
    </div>
    <span class="footer-right" id="charCount">0 / 300</span>
  </div>

</div>

<script>
  const msgs      = document.getElementById('messages');
  const input     = document.getElementById('inputField');
  const sendBtn   = document.getElementById('sendBtn');
  const charCount = document.getElementById('charCount');
  const root      = document.documentElement;

  document.querySelectorAll('.swatch').forEach(sw => {
    sw.addEventListener('click', () => {
      document.querySelectorAll('.swatch').forEach(s => s.classList.remove('active'));
      sw.classList.add('active');
      root.style.setProperty('--btn-color',  sw.dataset.color);
      root.style.setProperty('--btn-border', sw.dataset.border);
    });
  });

  const responses = [
    "Placeholder response. Replace with real agent output.",
    "This is a sample reply. Wire up your API here.",
    "応答プレースホルダー。\nPlaceholder response.",
    "Simulated output. Connect your model to populate this.",
    "Sample message. Build your logic here.",
  ];

  function addMessage(text, role) {
    const wrap = document.createElement('div');
    wrap.classList.add('msg', role);
    if (role !== 'system') {
      const lbl = document.createElement('div');
      lbl.classList.add('msg-label');
      lbl.textContent = role === 'user' ? 'USER' : 'AGENT';
      wrap.appendChild(lbl);
    }
    const bubble = document.createElement('div');
    bubble.classList.add('msg-bubble');
    bubble.innerHTML = text.replace(/\n/g, '<br>');
    wrap.appendChild(bubble);
    msgs.appendChild(wrap);
    msgs.scrollTop = msgs.scrollHeight;
    return wrap;
  }

  function addTyping() {
    const wrap = document.createElement('div');
    wrap.classList.add('msg', 'bot');
    const lbl = document.createElement('div');
    lbl.classList.add('msg-label');
    lbl.textContent = 'AGENT';
    wrap.appendChild(lbl);
    const bubble = document.createElement('div');
    bubble.classList.add('typing-bubble');
    bubble.innerHTML = '<span></span><span></span><span></span>';
    wrap.appendChild(bubble);
    msgs.appendChild(wrap);
    msgs.scrollTop = msgs.scrollHeight;
    return wrap;
  }

  function send() {
    const text = input.value.trim();
    if (!text) return;
    addMessage(text, 'user');
    input.value = '';
    charCount.textContent = '0 / 300';
    sendBtn.disabled = true;
    const t = addTyping();
    setTimeout(() => {
      t.remove();
      addMessage(responses[Math.floor(Math.random() * responses.length)], 'bot');
      sendBtn.disabled = false;
      input.focus();
    }, 600 + Math.random() * 700);
  }

  sendBtn.addEventListener('click', send);
  input.addEventListener('keydown', e => { if (e.key === 'Enter') send(); });
  input.addEventListener('input', () => {
    charCount.textContent = `${input.value.length} / 300`;
  });

  input.focus();
</script>
</body>
</html>
